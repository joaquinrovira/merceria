<!DOCTYPE html>
<html lang="en" class="h-full">

<head>
    <title>Seleccionar Archivo | Secure File Hub</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3 {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class="flex min-h-screen items-center justify-center p-4 bg-slate-50 dark:bg-slate-900 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] transition-colors duration-300">

    <div class="w-full max-w-lg bg-white dark:bg-slate-800 shadow-xl dark:shadow-2xl rounded-3xl p-6 sm:p-10 border border-slate-200 dark:border-slate-700 text-center relative overflow-hidden">

        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-40 h-40 bg-emerald-500 rounded-full blur-[90px] opacity-10 dark:opacity-20 pointer-events-none"></div>

        <div class="mb-8 relative z-10">
            <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-2xl bg-emerald-500/10 border border-emerald-500/20 mb-5">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                    <polyline points="14 2 14 8 20 8" />
                    <path d="M8 13h2M8 17h2M14 13h2M14 17h2" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 dark:text-white tracking-tight">Vincular Archivo</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">Bienvenido de vuelta, <strong class="text-emerald-600 dark:text-emerald-400">{{.Email}}</strong></p>
        </div>

        <div class="flex flex-col gap-4 items-center justify-center min-h-[60px] relative z-10">
            <button id="login_button" onclick="handleAuthClick()" style="display: none;" class="w-full inline-flex justify-center items-center gap-3 px-6 py-3 bg-white border border-slate-200 text-slate-700 font-semibold rounded-xl hover:bg-slate-50 transition-all shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4" />
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853" />
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05" />
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335" />
                </svg>
                Conectar con Google Drive
            </button>

            <button id="picker_button" onclick="createPicker()" style="display: none;" class="w-full inline-flex justify-center items-center gap-2 px-6 py-3 bg-emerald-600 text-white font-semibold rounded-xl hover:bg-emerald-500 transition-all shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                    <polyline points="14 2 14 8 20 8" />
                    <path d="M8 13h2" />
                    <path d="M8 17h2" />
                    <path d="M14 13h2" />
                    <path d="M14 17h2" />
                </svg>
                Buscar Hoja de Cálculo
            </button>
        </div>

        <form id="picker_form" method="POST" action="/pick" style="display: none;" class="mt-8 pt-8 border-t border-slate-100 dark:border-slate-700 text-left relative z-10">
            <div class="bg-slate-50 dark:bg-slate-900/80 p-5 rounded-2xl border border-emerald-500/20 dark:border-emerald-500/30 mb-6 shadow-inner">
                <label for="file-name" class="block text-xs font-bold uppercase tracking-widest text-emerald-600 dark:text-emerald-500 mb-3">Documento Seleccionado</label>
                <div class="flex items-center gap-4">
                    <div class="p-2 bg-emerald-500/10 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" class="text-emerald-600 dark:text-emerald-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                            <polyline points="14 2 14 8 20 8" />
                        </svg>
                    </div>
                    <input type="text" id="file-name" name="file-name" required readonly class="w-full bg-transparent border-none text-slate-900 dark:text-white font-semibold focus:ring-0 outline-none p-0" />
                </div>
                <input type="hidden" id="file-id" name="file-id" required />
                <input type="hidden" id="token" name="token" required />
            </div>

            <button type="submit" class="w-full inline-flex justify-center items-center gap-2 px-8 py-4 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-bold rounded-xl transition-all shadow-lg">
                Confirmar y Compartir
            </button>
        </form>
    </div>

    <script type="text/javascript">
        const SCOPES = 'https://www.googleapis.com/auth/drive.metadata.readonly';
        const CLIENT_ID = '{{.ClientID}}';
        const API_KEY = '{{.APIKey}}';
        const APP_ID = '{{.APPId}}';

        let tokenClient;
        let accessToken = '{{js .Token}}' || null;
        let pickerInited = false;
        let gisInited = false;

        function gapiLoaded() {
            gapi.load('client:picker', initializePicker);
        }

        async function initializePicker() {
            await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest');
            pickerInited = true;
            maybeEnableButtons();
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '',
            });
            gisInited = true;
            maybeEnableButtons();
        }

        function maybeEnableButtons() {
            if (!pickerInited || !gisInited) return;
            if (accessToken !== null) {
                document.getElementById('picker_button').style.display = 'inline-flex';
            } else {
                document.getElementById('login_button').style.display = 'inline-flex';
            }
        }

        function handleAuthClick() {
            tokenClient.callback = async (response) => {
                if (response.error !== undefined) throw (response);
                accessToken = response.access_token;
                document.getElementById('token').value = accessToken;
                document.getElementById('login_button').style.display = 'none';
                document.getElementById('picker_button').style.display = 'inline-flex';
                await createPicker();
            };

            tokenClient.requestAccessToken({ prompt: '' });
        }

        function createPicker() {
            const currentOrigin = window.location.protocol + '//' + window.location.host;
            const view = new google.picker
                .DocsView(google.picker.ViewId.SPREADSHEETS)
                .setMode(google.picker.DocsViewMode.LIST);
            view.setMimeTypes('application/vnd.google-apps.spreadsheet');
            const picker = new google.picker.PickerBuilder()
                .enableFeature(google.picker.Feature.NAV_HIDDEN)
                .enableFeature(google.picker.Feature.MINE_ONLY)
                .setDeveloperKey(API_KEY)
                .setAppId(APP_ID)
                .setOAuthToken(accessToken)
                .addView(view)
                .setCallback(pickerCallback)
                .setOrigin(currentOrigin)
                .setLocale("es-ES")
                .hideTitleBar()
                .build();
            picker.setVisible(true);
        }

        async function pickerCallback(data) {
            if (data.action === google.picker.Action.PICKED) {
                const doc = data[google.picker.Response.DOCUMENTS][0];
                const fileId = doc[google.picker.Document.ID];
                const fileName = doc[google.picker.Document.NAME];

                document.getElementById('file-name').value = fileName;
                document.getElementById('file-id').value = fileId;
                document.getElementById('picker_form').style.display = 'block';
                document.getElementById('picker_button').style.display = 'none';
            }
        }
    </script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
</body>

</html>
