    <script type="text/javascript">
        const SCOPES = 'https://www.googleapis.com/auth/drive.metadata.readonly';
        const CLIENT_ID = '{{.ClientID}}';
        const API_KEY = '{{.APIKey}}';
        const APP_ID = '{{.APPId}}';

        let tokenClient;
        let accessToken = '{{js .Token}}' || null;
        let pickerInited = false;
        let gisInited = false;

        function gapiLoaded() {
            gapi.load('client:picker', initializePicker);
        }

        async function initializePicker() {
            await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest');
            pickerInited = true;
            maybeEnableButtons();
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: '',
            });
            gisInited = true;
            maybeEnableButtons();
        }

        function maybeEnableButtons() {
            if (!pickerInited || !gisInited) return;
            if (accessToken !== null) {
                document.getElementById('picker_button').style.display = 'inline-flex';
            } else {
                document.getElementById('login_button').style.display = 'inline-flex';
            }
        }

        function handleAuthClick() {
            tokenClient.callback = async (response) => {
                if (response.error !== undefined) throw (response);
                accessToken = response.access_token;
                document.getElementById('token').value = accessToken;
                document.getElementById('login_button').style.display = 'none';
                document.getElementById('picker_button').style.display = 'inline-flex';
                await createPicker();
            };

            tokenClient.requestAccessToken({ prompt: '' });
        }

        function createPicker() {
            const currentOrigin = window.location.protocol + '//' + window.location.host;
            const view = new google.picker
                .DocsView(google.picker.ViewId.SPREADSHEETS)
                .setMode(google.picker.DocsViewMode.LIST);
            view.setMimeTypes('application/vnd.google-apps.spreadsheet');
            const picker = new google.picker.PickerBuilder()
                .enableFeature(google.picker.Feature.NAV_HIDDEN)
                .enableFeature(google.picker.Feature.MINE_ONLY)
                .setDeveloperKey(API_KEY)
                .setAppId(APP_ID)
                .setOAuthToken(accessToken)
                .addView(view)
                .setCallback(pickerCallback)
                .setOrigin(currentOrigin)
                .setLocale("es-ES")
                .hideTitleBar()
                .build();
            picker.setVisible(true);
        }

        async function pickerCallback(data) {
            if (data.action === google.picker.Action.PICKED) {
                const doc = data[google.picker.Response.DOCUMENTS][0];
                const fileId = doc[google.picker.Document.ID];
                const fileName = doc[google.picker.Document.NAME];

                document.getElementById('file-name').value = fileName;
                document.getElementById('file-id').value = fileId;
                document.getElementById('picker_form').style.display = 'block';
            }
        }
    </script>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
