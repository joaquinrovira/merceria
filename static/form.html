<!DOCTYPE html>
<html lang="es" class="h-full">

<head>
    <title>Nuevo Pedido | Data Entry</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3 {
            font-family: 'Outfit', sans-serif;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #64748b;
            border-radius: 10px;
        }

        /* Smooth fade for the message dismissal */
        .fade-out {
            opacity: 0;
            transition: opacity 0.5s ease-out;
        }
    </style>
</head>

<body class="flex flex-col min-h-screen items-center justify-center p-4 sm:p-8 bg-slate-50 dark:bg-slate-900 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] transition-colors duration-300">

    <div class="w-full max-w-2xl flex justify-between items-center mb-4 px-2">
        <button onclick="window.location.href='/pick'" class="flex items-center gap-2 text-sm font-medium text-slate-500 hover:text-emerald-600 dark:text-slate-400 dark:hover:text-emerald-400 transition-colors group">
            <div class="p-2 rounded-lg bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 group-hover:border-emerald-500/50">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m12 19-7-7 7-7" />
                    <path d="M19 12H5" />
                </svg>
            </div>
            <span class="hidden sm:inline">Elegir otro archivo</span>
        </button>

        <button onclick="window.location.href='/auth/logout'" class="flex items-center gap-2 text-sm font-medium text-slate-500 hover:text-red-500 dark:text-slate-400 dark:hover:text-red-400 transition-colors group">
            <span class="hidden sm:inline">Cerrar Sesión</span>
            <div class="p-2 rounded-lg bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 group-hover:border-red-500/50">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" x2="9" y1="12" y2="12" />
                </svg>
            </div>
        </button>
    </div>

    <div class="w-full max-w-2xl bg-white dark:bg-slate-800 shadow-xl dark:shadow-2xl rounded-3xl p-6 sm:p-10 border border-slate-200 dark:border-slate-700 relative overflow-hidden">

        <div class="absolute top-0 right-0 w-48 h-48 bg-emerald-500 rounded-full blur-[100px] opacity-10 dark:opacity-20 pointer-events-none"></div>
        <div class="absolute bottom-0 left-0 w-32 h-32 bg-blue-500 rounded-full blur-[80px] opacity-10 dark:opacity-20 pointer-events-none"></div>

        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-5 mb-8 pb-6 border-b border-slate-100 dark:border-slate-700 relative z-10">
            <div class="flex h-14 w-14 shrink-0 items-center justify-center rounded-2xl bg-emerald-500/10 border border-emerald-500/20 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <line x1="19" x2="19" y1="8" y2="14" />
                    <line x1="22" x2="16" y1="11" y2="11" />
                </svg>
            </div>
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 dark:text-white tracking-tight">Registrar Pedido</h1>
                <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Completa los campos para actualizar la base de datos.</p>
            </div>
        </div>

        <div id="message" class="hidden mb-6 p-4 rounded-xl text-sm font-medium border animate-pulse"></div>

        <form method="POST" action="/form" class="space-y-8 relative z-10">
            <div class="space-y-5">
                <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-emerald-600 dark:text-emerald-500 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                    Información del Cliente
                </h3>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-2">
                        <label for="fecha" class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Fecha de Recepción</label>
                        <input type="date" id="fecha" name="fecha" required class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-emerald-500 outline-none transition-all" />
                    </div>
                    <div class="space-y-2">
                        <label for="nombre" class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Nombre Completo</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Nombre del cliente" required class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600 focus:ring-2 focus:ring-emerald-500 outline-none transition-all" />
                    </div>
                    <div class="md:col-span-2 space-y-2">
                        <label for="telefono" class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Teléfono de Contacto</label>
                        <input type="text" id="telefono" name="telefono" placeholder="+34 000 000 000" class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600 focus:ring-2 focus:ring-emerald-500 outline-none transition-all" />
                    </div>
                </div>
            </div>

            <div class="space-y-5">
                <h3 class="text-xs font-bold uppercase tracking-[0.2em] text-emerald-600 dark:text-emerald-500 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="18" height="18" x="3" y="3" rx="2" />
                        <path d="M3 9h18" />
                        <path d="M9 21V9" />
                    </svg>
                    Detalles del Pedido
                </h3>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
                    <div class="space-y-2">
                        <label for="prendas" class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Nº Prendas</label>
                        <input type="number" id="prendas" name="prendas" min="1" value="1" required class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-emerald-500 outline-none" />
                    </div>
                    <div class="space-y-2">
                        <label for="grupo" class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Grupo</label>
                        <div class="relative">
                            <select id="grupo" name="grupo" required class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-emerald-500 outline-none appearance-none">
                                <option value="Grupo 1" selected>Grupo 1</option>
                                <option value="Grupo 2">Grupo 2</option>
                                <option value="Grupo 3">Grupo 3</option>
                            </select>
                            <div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-slate-400">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="m6 9 6 6 6-6" />
                                </svg>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label for="estado" class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Estado</label>
                        <div class="relative">
                            <select id="estado" name="estado" required class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white focus:ring-2 focus:ring-emerald-500 outline-none appearance-none">
                                <option value="FALSE" selected>🟡 Pendiente</option>
                                <option value="TRUE">🟢 Completado</option>
                            </select>
                            <div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-slate-400">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="m6 9 6 6 6-6" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="space-y-2">
                    <label for="notas" class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Notas</label>
                    <div class="relative">
                        <textarea id="notas" name="notas" rows="3" placeholder="Instrucciones especiales o detalles adicionales..." class="w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600 focus:ring-2 focus:ring-emerald-500 transition-all outline-none resize-none"></textarea>
                        <div class="absolute bottom-3 right-3 text-slate-600 pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full inline-flex justify-center items-center gap-3 px-8 py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-2xl transition-all shadow-lg shadow-emerald-900/20 dark:shadow-emerald-900/40 group">
                <span>Finalizar Registro</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:translate-x-1 transition-transform">
                    <path d="M5 12h14" />
                    <path d="m12 5 7 7-7 7" />
                </svg>
            </button>
        </form>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Set default date
            document.getElementById('fecha').valueAsDate = new Date();

            const messageDiv = document.getElementById('message');
            const urlParams = new URLSearchParams(window.location.search);

            if (urlParams.has('success') || urlParams.has('error')) {
                if (urlParams.has('success')) {
                    messageDiv.textContent = '¡Pedido guardado correctamente! ✨';
                    messageDiv.classList.add('bg-emerald-500/10', 'text-emerald-500', 'border-emerald-500/20');
                } else {
                    messageDiv.textContent = urlParams.get('error') || 'Hubo un error al procesar el pedido.';
                    messageDiv.classList.add('bg-red-500/10', 'text-red-500', 'border-red-500/20');
                }

                messageDiv.classList.remove('hidden');
            }
            if (urlParams.has('success')) {
                // Auto-hide message after 5 seconds
                setTimeout(() => {
                    messageDiv.classList.add('fade-out');
                    setTimeout(() => {
                        messageDiv.classList.add('hidden');
                        // Clean URL to prevent message reappearing on refresh
                        window.history.replaceState({}, document.title, window.location.pathname);
                    }, 500);
                }, 5000);
            }
        });
    </script>
</body>

</html>
